name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, ready_for_review]

jobs:
  claude:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true

  claude-auto-review:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            Review this pull request (#${{ github.event.pull_request.number }} —
            "${{ github.event.pull_request.title }}") and post your review as a
            single comment on the PR using the available GitHub tools.

            This is Codex Island, a public Swift macOS menu-bar app shipping via
            Sparkle auto-update. Read CLAUDE.md first — it documents hard rules
            that have already broken auto-update once.

            Review priorities (highest first):
              1. Auto-update breakage. Flag any change to SU_PUBLIC_KEY, VERSION
                 format/parsing, CFBundleVersion, appcast generation, the EdDSA
                 signing flow, the homebrew-tap sync, or release.yml.
              2. Correctness bugs. Force-unwraps without justification, race
                 conditions, retain cycles, missing keychain refresh-token
                 rotation, polling below 5m, wrong User-Agent on Claude OAuth.
              3. Regressions in core flows. Notched-display window placement,
                 occlusion/Low-Power pause, provider error surfacing.
              4. Security. Token handling, network scope, code-signing.

            Skip style nits and refactors that aren't broken. Be terse.

            Output format:
              - One-line verdict: SHIP / SHIP WITH NITS / NEEDS WORK / BLOCKED.
              - Findings grouped by priority bucket above with `file:line` refs.
              - If the PR is small and clean, say so in one sentence.
